# SonarQube Project Configuration
# Used by: mvn sonar:sonar in Jenkins pipeline

sonar.projectKey=multitier-webapp
sonar.projectName=Multi-Tier Web Application
sonar.projectVersion=1.0

# Source & binaries
sonar.sources=app/src/main
sonar.tests=app/src/test
sonar.java.binaries=target/classes
sonar.java.libraries=target/dependency/*.jar

# Coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.java.coveragePlugin=jacoco

# Quality Gates
sonar.qualitygate.wait=true

# Exclusions
sonar.exclusions=**/generated/**,**/vendor/**,**/*.min.js

# Encoding
sonar.sourceEncoding=UTF-8
