trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/*

variables:
  ACR_NAME: 'ecommerceacr'
  AKS_CLUSTER_NAME: 'ecommerce-aks-prod'
  AKS_RESOURCE_GROUP: 'ecommerce-rg'
  NAMESPACE: 'production'
  IMAGE_TAG: '$(Build.BuildId)'

stages:
  # ─────────────────────────────────────────────
  - stage: Build
    displayName: '🔨 Build & Push Docker Images'
    jobs:
      - job: BuildImages
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: 'ACR-ServiceConnection'

          - task: Docker@2
            displayName: 'Build Frontend Image'
            inputs:
              command: buildAndPush
              repository: 'ecommerce-frontend'
              dockerfile: 'docker/frontend/Dockerfile'
              containerRegistry: 'ACR-ServiceConnection'
              tags: |
                $(IMAGE_TAG)
                latest

          - task: Docker@2
            displayName: 'Build Backend Image'
            inputs:
              command: buildAndPush
              repository: 'ecommerce-backend'
              dockerfile: 'docker/backend/Dockerfile'
              containerRegistry: 'ACR-ServiceConnection'
              tags: |
                $(IMAGE_TAG)
                latest

  # ─────────────────────────────────────────────
  - stage: Test
    displayName: '🧪 Run Tests'
    dependsOn: Build
    jobs:
      - job: UnitTests
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              cd app
              npm install
              npm test -- --coverage
            displayName: 'Run Unit Tests'

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'

  # ─────────────────────────────────────────────
  - stage: SecurityScan
    displayName: '🔒 Security Scan'
    dependsOn: Test
    jobs:
      - job: TrivyScan
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              # Install Trivy
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

              # Scan images
              trivy image --exit-code 1 --severity HIGH,CRITICAL \
                $(ACR_NAME).azurecr.io/ecommerce-frontend:$(IMAGE_TAG)
              trivy image --exit-code 1 --severity HIGH,CRITICAL \
                $(ACR_NAME).azurecr.io/ecommerce-backend:$(IMAGE_TAG)
            displayName: 'Trivy Container Scan'

  # ─────────────────────────────────────────────
  - stage: DeployDev
    displayName: '🚀 Deploy to Dev'
    dependsOn: SecurityScan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDev
        environment: 'Development'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Get AKS Credentials'
                  inputs:
                    azureSubscription: 'Azure-ServiceConnection'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(AKS_RESOURCE_GROUP) \
                        --name ecommerce-aks-dev \
                        --overwrite-existing

                - task: HelmDeploy@0
                  displayName: 'Helm Deploy to Dev'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscription: 'Azure-ServiceConnection'
                    azureResourceGroup: $(AKS_RESOURCE_GROUP)
                    kubernetesCluster: ecommerce-aks-dev
                    namespace: development
                    command: upgrade
                    chartType: FilePath
                    chartPath: kubernetes/helm
                    releaseName: ecommerce-dev
                    arguments: >
                      --set image.tag=$(IMAGE_TAG)
                      --set replicaCount=1
                      --create-namespace

  # ─────────────────────────────────────────────
  - stage: DeployProd
    displayName: '🏭 Deploy to Production'
    dependsOn: SecurityScan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProd
        environment: 'Production'  # Requires manual approval in Azure DevOps
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Get AKS Credentials'
                  inputs:
                    azureSubscription: 'Azure-ServiceConnection'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(AKS_RESOURCE_GROUP) \
                        --name $(AKS_CLUSTER_NAME) \
                        --overwrite-existing

                - task: HelmDeploy@0
                  displayName: 'Helm Deploy to Production'
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscription: 'Azure-ServiceConnection'
                    azureResourceGroup: $(AKS_RESOURCE_GROUP)
                    kubernetesCluster: $(AKS_CLUSTER_NAME)
                    namespace: $(NAMESPACE)
                    command: upgrade
                    chartType: FilePath
                    chartPath: kubernetes/helm
                    releaseName: ecommerce-prod
                    arguments: >
                      --set image.tag=$(IMAGE_TAG)
                      --set replicaCount=3
                      --set ingress.enabled=true
                      --create-namespace
