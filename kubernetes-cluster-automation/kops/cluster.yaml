---
# kops Cluster Specification
# Apply with: kops apply -f cluster.yaml --state $KOPS_STATE_STORE

apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: prod.k8s.yourdomain.com
spec:
  api:
    loadBalancer:
      type: Public
      idleTimeoutSeconds: 300

  authorization:
    rbac: {}

  channel: stable
  cloudProvider: aws
  configBase: s3://your-kops-state-bucket/prod.k8s.yourdomain.com

  # HA: 3 masters across 3 AZs
  etcdClusters:
    - etcdMembers:
        - instanceGroup: master-us-east-1a
          name: a
        - instanceGroup: master-us-east-1b
          name: b
        - instanceGroup: master-us-east-1c
          name: c
      name: main
      version: 3.5.6
    - etcdMembers:
        - instanceGroup: master-us-east-1a
          name: a
        - instanceGroup: master-us-east-1b
          name: b
        - instanceGroup: master-us-east-1c
          name: c
      name: events

  iam:
    allowContainerRegistry: true
    legacy: false

  kubelet:
    anonymousAuth: false

  kubernetesApiAccess:
    - 0.0.0.0/0  # Restrict to your IP in production

  kubernetesVersion: 1.29.0

  masterPublicName: api.prod.k8s.yourdomain.com

  networkCIDR: 10.0.0.0/16
  networking:
    calico:
      crossSubnet: true

  nonMasqueradeCIDR: 100.64.0.0/10

  # 3 AZs for high availability
  subnets:
    - cidr: 10.0.32.0/19
      name: us-east-1a
      type: Private
      zone: us-east-1a
    - cidr: 10.0.64.0/19
      name: us-east-1b
      type: Private
      zone: us-east-1b
    - cidr: 10.0.96.0/19
      name: us-east-1c
      type: Private
      zone: us-east-1c
    - cidr: 10.0.1.0/24
      name: utility-us-east-1a
      type: Utility
      zone: us-east-1a
    - cidr: 10.0.2.0/24
      name: utility-us-east-1b
      type: Utility
      zone: us-east-1b
    - cidr: 10.0.3.0/24
      name: utility-us-east-1c
      type: Utility
      zone: us-east-1c

  topology:
    dns:
      type: Public
    masters: private
    nodes: private

---
# Master Instance Group — AZ a
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: prod.k8s.yourdomain.com
  name: master-us-east-1a
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-20240301
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: Master
  subnets:
    - us-east-1a

---
# Master Instance Group — AZ b
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: prod.k8s.yourdomain.com
  name: master-us-east-1b
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-20240301
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: Master
  subnets:
    - us-east-1b

---
# Master Instance Group — AZ c
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: prod.k8s.yourdomain.com
  name: master-us-east-1c
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-20240301
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: Master
  subnets:
    - us-east-1c

---
# Worker Node Instance Group (with autoscaling)
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: prod.k8s.yourdomain.com
  name: nodes
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-20240301
  machineType: t3.large
  maxSize: 10
  minSize: 3
  role: Node
  cloudLabels:
    k8s.io/cluster-autoscaler/enabled: "true"
    k8s.io/cluster-autoscaler/prod.k8s.yourdomain.com: "owned"
  subnets:
    - us-east-1a
    - us-east-1b
    - us-east-1c
